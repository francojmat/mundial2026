name: Update Mundial Data

on:
  # Cron de respaldo cada 5 minutos (mínimo de GitHub)
  schedule:
    - cron: "*/5 * * * *"
  # Disparo externo desde cron-job.org
  workflow_dispatch:

# Una sola corrida a la vez: si llega otra mientras una está corriendo, se cancela
# la anterior (cancelada NO cuenta como fallo → no manda mail, y no se pisan los push).
concurrency:
  group: update-mundial
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4   # main = solo código (Pages lo deploya en code change)

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install requests

      # Trae los datos/caches más recientes desde la rama 'data' (estado entre corridas).
      - name: Pull latest data + caches from 'data' branch
        run: |
          git fetch origin data 2>/dev/null || echo "Sin rama 'data' todavía."
          # Checkout archivo por archivo: si uno no existe aún (ej. data2.json en el bootstrap)
          # no aborta a los demás.
          for f in data.json data2.json planteles.json partidos.json selecciones.json events_cache.json apifootball_cache.json live_windows.json cruces.json sim.json estadisticas.json posts.json; do
            git checkout origin/data -- "$f" 2>/dev/null || true
          done

      - name: Generate
        continue-on-error: true
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          APIFOOTBALL_KEY: ${{ secrets.APIFOOTBALL_KEY }}
        run: python generate.py

      # Publica SOLO los datos a la rama 'data' (que Pages NO deploya → sin redeploys, sin 522).
      # main queda intacto. Force-push de un único commit con los archivos de datos.
      - name: Publish data to 'data' branch
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git checkout --orphan data-tmp
          git reset
          git add -f data.json data2.json planteles.json partidos.json selecciones.json events_cache.json apifootball_cache.json live_windows.json cruces.json sim.json estadisticas.json posts.json
          if git diff --staged --quiet; then
            echo "Sin cambios en datos."
          else
            git commit -m "data $(date -u '+%H:%M UTC')"
            git push origin data-tmp:data --force
          fi
          exit 0
