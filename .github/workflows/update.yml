name: Update Mundial Data

on:
  # Cron de respaldo cada 5 minutos (mínimo de GitHub)
  schedule:
    - cron: "*/5 * * * *"
  # Disparo externo desde cron-job.org
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install requests

      # Si la API corta (429) o falla, no rompemos la corrida: se reintenta al próximo ciclo.
      - name: Generate HTML + data.json
        continue-on-error: true
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          APIFOOTBALL_KEY: ${{ secrets.APIFOOTBALL_KEY }}
        run: python generate.py

      # Push resiliente: si otra corrida pusheó primero, rebase y reintento.
      # Pase lo que pase, la corrida termina OK (exit 0) para no mandar mails de fallo.
      - name: Commit if data changed
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -A
          if git diff --staged --quiet; then
            echo "Sin cambios, no hay commit."
            exit 0
          fi
          git commit -m "update $(date -u '+%H:%M UTC')"
          for i in 1 2 3; do
            if git push; then
              echo "Push OK"
              exit 0
            fi
            echo "Push rechazado, reintentando ($i)..."
            git pull --rebase -X theirs origin main || git rebase --abort
          done
          echo "No se pudo pushear tras 3 intentos; el próximo ciclo lo toma."
          exit 0
