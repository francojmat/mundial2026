name: Update Mundial Data

on:
  # Cron de respaldo cada 5 minutos (mínimo de GitHub)
  schedule:
    - cron: "*/5 * * * *"
  # Disparo externo desde cron-job.org cada 60s
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install requests

      - name: Generate HTML + data.json
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          APIFOOTBALL_KEY: ${{ secrets.APIFOOTBALL_KEY }}
        run: python generate.py

      - name: Commit if data changed
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add data.json mundial2026.html events_cache.json
          if git diff --staged --quiet; then
            echo "Sin cambios, no hay commit."
          else
            git commit -m "update $(date -u '+%H:%M UTC')"
            git push
          fi
