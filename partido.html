<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Ver Partido · Mundial 2026</title>
  <meta name="description" content="Detalle del partido del Mundial 2026: alineaciones, cronología minuto a minuto, estadísticas, historial entre las selecciones y posiciones del grupo.">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Mejor Tercero">
  <meta property="og:title" content="Ver Partido · Mundial 2026">
  <meta property="og:description" content="Alineaciones, cronología, estadísticas e historial del partido en el Mundial 2026.">
  <meta property="og:image" content="https://mejortercero.online/og.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://mejortercero.online/og.png">
  <meta name="theme-color" content="#c2410c">
  <link rel="icon" href="/favicon.ico">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#faf8f4;color:#211c14;padding:24px 18px 48px}
    .wrap{max-width:680px;margin:0 auto}
    .topbar{display:flex;align-items:center;gap:12px;margin-bottom:22px}
    .back{display:inline-flex;align-items:center;gap:6px;font-size:.8rem;font-weight:600;color:#c2410c;text-decoration:none;border:1px solid #e8ddd0;border-radius:8px;padding:6px 12px;background:#ffffff}
    .back:hover{background:#f0ebe4}
    .brand{font-size:.7rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#b09880}
    .mt-head{background:#ffffff;border:1px solid #e8ddd0;border-radius:12px;padding:18px 16px;text-align:center;margin-bottom:22px}
    .mt-meta{font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#b09880;margin-bottom:12px}
    .mt-scoreline{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:9px}
    .mt-team{font-size:1rem;font-weight:700;display:flex;align-items:center;gap:7px}
    .mt-th{justify-content:flex-end}
    .mt-ta{justify-content:flex-start}
    .mt-fl{width:26px;height:20px;border-radius:2px}
    .mt-center{display:flex;align-items:center;gap:7px}
    .mt-sc{font-size:1.7rem;font-weight:800;color:#211c14}
    .mt-sep{color:#b09880;font-weight:700}
    .mt-vs{font-size:.85rem;color:#b09880;font-weight:700}
    .mt-badge-wrap{margin-top:10px}
    .mt-badge{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:4px 11px;border-radius:999px;display:inline-flex;align-items:center;gap:5px;background:transparent;border:1.5px solid transparent}
    .mt-fin{color:#7c6a58;border-color:#c8b8a8}
    .mt-live{color:#c2410c;border-color:#c2410c}
    .mt-dot{width:6px;height:6px;border-radius:50%;background:#c2410c;animation:mtblink 1.4s ease-in-out infinite}
    @keyframes mtblink{0%,100%{opacity:1}50%{opacity:.2}}
    .mt-venue{font-size:.72rem;color:#7c6a58;margin-top:9px}
    .mt-ref{font-size:.72rem;color:#7c6a58;margin-top:10px}
    .mt-venue-img{width:100%;max-height:150px;object-fit:cover;border-radius:8px;margin-top:14px;display:block}
    .mt-gm{display:flex;flex-direction:column;gap:6px}
    .mt-gm-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;padding:9px 13px;background:#ffffff;border:1px solid #e8ddd0;border-radius:9px;text-decoration:none;color:#211c14;position:relative}
    a.mt-gm-row:hover{border-color:#c8b8a8}
    .mt-gm-cur{background:rgba(194,65,12,.06);border-color:#c2410c}
    .mt-gm-h{justify-self:end;text-align:right;font-size:.8rem;display:flex;align-items:center;gap:6px}
    .mt-gm-a{justify-self:start;text-align:left;font-size:.8rem;display:flex;align-items:center;gap:6px}
    .mt-gm-fl{width:18px;height:13px;border-radius:2px}
    .mt-gm-sc{font-size:.9rem;font-weight:700;color:#c2410c;min-width:46px;text-align:center}
    .mt-gm-dt{font-size:.7rem;font-weight:600;color:#7c6a58;min-width:72px;text-align:center}
    .mt-gm-live{position:absolute;top:-7px;left:50%;transform:translateX(-50%);font-size:.5rem;font-weight:700;letter-spacing:.05em;background:#c2410c;color:#fff;padding:1px 7px;border-radius:6px}
    .mt-sec{margin-bottom:26px}
    .mt-st{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#c2410c;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid #e8ddd0}
    .mt-ln-grid,.mt-pl-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .mt-ln-team,.mt-pl-team{background:#ffffff;border:1px solid #e8ddd0;border-radius:10px;padding:12px}
    .mt-ln-h{font-size:.82rem;font-weight:700;margin-bottom:9px;display:flex;align-items:center;justify-content:space-between;gap:6px}
    .mt-form{font-size:.64rem;font-weight:700;color:#c2410c;background:transparent;border:1.5px solid #c2410c;border-radius:8px;padding:2px 7px}
    .mt-pitch{position:relative;width:100%;max-width:360px;margin:0 auto 16px;aspect-ratio:3/4;background:repeating-linear-gradient(0deg,#3c7d3c 0,#3c7d3c 12.5%,#367536 12.5%,#367536 25%);border:2px solid rgba(255,255,255,.45);border-radius:8px;overflow:hidden}
    .mt-pitch::before{content:'';position:absolute;top:50%;left:0;right:0;height:2px;background:rgba(255,255,255,.4)}
    .mt-pitch::after{content:'';position:absolute;top:50%;left:50%;width:72px;height:72px;border:2px solid rgba(255,255,255,.4);border-radius:50%;transform:translate(-50%,-50%)}
    .mt-pp{position:absolute;transform:translate(-50%,-50%);width:46px;text-align:center;z-index:2}
    .mt-pp-n{display:flex;align-items:center;justify-content:center;width:23px;height:23px;border-radius:50%;font-size:.6rem;font-weight:700;margin:0 auto;color:#fff;border:1.5px solid rgba(255,255,255,.75)}
    .mt-pp-h .mt-pp-n{background:#c2410c}
    .mt-pp-a .mt-pp-n{background:#0d9488}
    .mt-pp-name{display:block;font-size:.5rem;color:#fff;font-weight:700;margin-top:1px;text-shadow:0 1px 2px rgba(0,0,0,.7);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .mt-timeline{display:flex;flex-direction:column}
    .tl-row{display:flex;align-items:flex-start;gap:9px;padding:7px 2px;border-bottom:1px solid #f0ebe4;font-size:.82rem}
    .tl-row:last-child{border-bottom:none}
    .tl-min{color:#b09880;font-size:.7rem;font-weight:700;min-width:30px;flex-shrink:0;padding-top:2px}
    .tl-dot{width:7px;height:7px;border-radius:50%;background:#c2410c;flex-shrink:0;margin-top:5px}
    .tl-yc{width:7px;height:10px;background:#d97706;flex-shrink:0;margin-top:3px;border-radius:1px}
    .tl-rc{width:7px;height:10px;background:#dc2626;flex-shrink:0;margin-top:3px;border-radius:1px}
    .tl-sw{font-size:.8rem;color:#0d9488;flex-shrink:0;line-height:1.3}
    .tl-txt{flex:1;line-height:1.5;color:#211c14}
    .tl-s{color:#7c6a58;font-size:.72rem}
    .mt-h2h-box{background:#ffffff;border:1px solid #e8ddd0;border-radius:12px;padding:6px 16px 10px}
    .mt-h2h-hd{text-align:center;margin:10px 0 6px}
    .mt-h2h-badge{display:inline-block;font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#c2410c;border:1px solid #c2410c;border-radius:999px;padding:4px 13px;background:rgba(194,65,12,.05)}
    .mt-h2h{display:flex;flex-direction:column}
    .mt-h2h-row{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:6px 12px;padding:8px 2px;border-bottom:1px solid #f0ebe4;font-size:.78rem}
    .mt-h2h-row:last-child{border-bottom:none}
    .mt-h2h-d{color:#b09880;font-size:.7rem;font-weight:700;white-space:nowrap}
    .mt-h2h-c{color:#7c6a58;font-size:.68rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .mt-h2h-r{text-align:right;white-space:nowrap;color:#211c14}
    .mt-h2h-first{text-align:center;padding:24px 18px}
    .mt-h2h-ico{font-size:1.5rem;color:#c2410c;margin-bottom:8px;opacity:.85}
    .mt-h2h-first-t{font-size:.95rem;font-weight:700;color:#c2410c;margin-bottom:5px}
    .mt-h2h-first-s{font-size:.8rem;color:#7c6a58;line-height:1.5;max-width:340px;margin:0 auto}
    .mt-motm{display:flex;align-items:center;gap:13px;background:linear-gradient(135deg,#fff7f3,#fff);border:1.5px solid #c2410c}
    .motm-ico{color:#c2410c;font-size:1.6rem;line-height:1;flex-shrink:0}
    .motm-lbl{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#b09880;margin-bottom:1px}
    .motm-name{font-weight:700;color:#211c14;font-size:1.02rem}
    .mt-hl{display:inline-flex;align-items:center;gap:8px;font-size:.82rem;font-weight:700;color:#c2410c;border:1.5px solid #c2410c;border-radius:8px;padding:9px 16px;text-decoration:none;background:transparent}
    .mt-hl:hover{background:rgba(194,65,12,.08)}
    .mt-hl-ico{font-size:.65rem}
    .mt-ln-list{display:flex;flex-direction:column;gap:3px}
    .mt-pl{display:flex;align-items:center;gap:8px;font-size:.78rem;padding:2px 0}
    .mt-pl-n{color:#c2410c;font-weight:700;min-width:18px;text-align:center;font-size:.72rem}
    .mt-pl-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .mt-pl-pos{font-size:.58rem;color:#b09880;font-weight:700;white-space:nowrap;text-transform:uppercase;letter-spacing:.02em;flex-shrink:0}
    .mt-subt{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#b09880;margin:10px 0 5px}
    .mt-subs{opacity:.78}
    .mt-coach{font-size:.68rem;color:#7c6a58;margin-top:9px;padding-top:7px;border-top:1px solid #f0ebe4}
    .mt-strow{margin-bottom:11px}
    .mt-stvals{display:flex;justify-content:space-between;align-items:center;font-size:.82rem;font-weight:700;margin-bottom:3px}
    .mt-stlbl{font-size:.66rem;font-weight:600;color:#7c6a58;text-transform:uppercase;letter-spacing:.04em}
    .mt-bar{display:flex;height:6px;border-radius:3px;overflow:hidden;background:#f0ebe4}
    .mt-bar-h{background:#c2410c}
    .mt-bar-a{background:#0d9488}
    .mt-ptable{width:100%;border-collapse:collapse;font-size:.76rem}
    .mt-ptable th{font-size:.6rem;text-transform:uppercase;letter-spacing:.05em;color:#b09880;text-align:center;padding:4px 3px;border-bottom:1px solid #e8ddd0}
    .mt-ptable td{text-align:center;padding:5px 3px;border-bottom:1px solid #f0ebe4}
    .mt-ptable .mt-p-name{text-align:left;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px}
    .mt-tlink{color:inherit;text-decoration:none}
    .mt-tlink:hover{color:#c2410c;text-decoration:underline}
    .mt-rating{background:#c2410c;color:#ffffff;border-radius:6px;padding:1px 6px;font-weight:700;font-size:.72rem}
    .mt-cap{font-size:.55rem;background:#7c6a58;color:#ffffff;border-radius:3px;padding:0 3px;font-weight:700;vertical-align:middle}
    .mt-stand .mt-cls{background:rgba(13,148,136,.08)}
    .mt-stand .mt-third{background:rgba(194,65,12,.08)}
    .mt-nodata{text-align:center;color:#7c6a58;font-size:.8rem;background:#ffffff;border:1px dashed #c8b8a8;border-radius:10px;padding:20px 16px}
    .loading{text-align:center;color:#7c6a58;font-size:.85rem;margin-top:40px}
    @media(max-width:560px){
      .mt-ln-grid,.mt-pl-grid{grid-template-columns:1fr}
      .mt-team{font-size:.85rem}
      .mt-sc{font-size:1.4rem}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a class="back" id="mt-back" href="/">&#8592; Volver al inicio</a>
      <a class="back" id="mt-home" href="/" style="display:none">Inicio</a>
      <span class="brand">Mundial 2026</span>
    </div>
    <div id="match"><p class="loading">Cargando partido…</p></div>
  </div>
  <script>
    var _q = new URLSearchParams(location.search);
    var MID = _q.get('id') || '';
    // Si venís del perfil de una selección, el "Volver" te devuelve a esa selección
    (function() {
      var from = _q.get('t'), fromName = _q.get('tn') || from;
      if (from) {
        var b = document.getElementById('mt-back');
        b.href = '/seleccion.html?t=' + encodeURIComponent(from);
        b.innerHTML = '&#8592; Volver a ' + fromName;
        document.getElementById('mt-home').style.display = '';
      }
    })();

    // Formatea los horarios de los partidos próximos del grupo a la zona del usuario
    function fmtMatchTimes() {
      document.querySelectorAll('.mt-gm-dt[data-utc]').forEach(function(e) {
        var d = new Date(e.getAttribute('data-utc'));
        if (isNaN(d)) return;
        e.textContent = d.toLocaleDateString('es', {day:'2-digit', month:'2-digit'})
          + ' ' + d.toLocaleTimeString('es', {hour:'2-digit', minute:'2-digit'});
      });
    }

    function loadMatch() {
      var box = document.getElementById('match');
      fetch('/api/partidos')
        .then(function(r) { return r.json(); })
        .then(function(d) {
          var html = d[MID];
          if (html) { box.innerHTML = html; fmtMatchTimes(); pollMatchLive(); }
          else { box.innerHTML = '<p class="loading">Detalle no disponible todavía. Probá cuando arranque el partido.</p>'; }
        })
        .catch(function() { box.innerHTML = '<p class="loading">No se pudo cargar el partido.</p>'; });
    }

    // Actualiza marcador, minuto y badge EN VIVO sin recargar (cada 8s)
    function pollMatchLive() {
      fetch('/api/live')
        .then(function(r) { return r.json(); })
        .then(function(d) {
          var m = (d.matches || []).filter(function(x) { return String(x.id) === String(MID); })[0];
          if (!m) return;
          var center = document.getElementById('mt-center');
          if (center && m.h != null) {
            center.innerHTML = '<span class="mt-sc">' + m.h + '</span><span class="mt-sep">-</span><span class="mt-sc">' + m.a + '</span>';
          }
          var badge = document.getElementById('mt-badge');
          if (badge) {
            badge.innerHTML = (m.status === 'HT')
              ? '<span class="mt-badge mt-live"><span class="mt-dot"></span>Entretiempo</span>'
              : '<span class="mt-badge mt-live"><span class="mt-dot"></span>EN VIVO <span class="mt-min">' + (m.elapsed != null ? m.elapsed + "'" : '') + '</span></span>';
          }
        })
        .catch(function() {});
    }

    loadMatch();
    setInterval(pollMatchLive, 8000);
  </script>
</body>
</html>
