<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">

  <meta name="description" content="Perfil de la selección en el Mundial 2026: ranking FIFA, palmarés mundialista, su grupo, partidos y acceso al plantel completo.">

  <meta property="og:title" content="Perfil de selección · Mundial 2026">
  <meta property="og:description" content="Ranking FIFA, palmarés, grupo y partidos de la selección en el Mundial 2026.">

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#faf8f4;color:#211c14;padding:24px 18px 48px}
    .wrap{max-width:640px;margin:0 auto}
    .topbar{display:flex;align-items:center;gap:12px;margin-bottom:22px}
    .back{display:inline-flex;align-items:center;gap:6px;font-size:.8rem;font-weight:600;color:#c2410c;text-decoration:none;border:1px solid #e8ddd0;border-radius:8px;padding:6px 12px;background:#ffffff}
    .back:hover{background:#f0ebe4}
    .brand{font-size:.7rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#b09880}
    .pl-title{font-size:1.5rem;font-weight:700;letter-spacing:-.02em;margin-bottom:14px;display:flex;align-items:center;gap:10px}
    .pl-title img{width:32px;height:24px;border-radius:2px}
    .pl-ficha{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:26px}
    .pl-fi{background:#ffffff;border:1px solid #e8ddd0;border-radius:10px;padding:8px 13px;display:flex;flex-direction:column;gap:2px;flex:1;min-width:118px}
    .pl-fi-wide{flex:2;min-width:170px}
    .pl-fi-k{font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#b09880}
    .pl-fi-v{font-size:.9rem;font-weight:700;color:#211c14}
    .pl-fi-v.rk{color:#c2410c}
    .sl-sec{margin-bottom:26px}
    .pl-gt{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#c2410c;margin-bottom:11px}
    .cz-head{font-size:.8rem;font-weight:700;color:#211c14;margin-bottom:5px;line-height:1.3}
    .cz-sub{font-size:.68rem;color:#7c6a58;margin-bottom:10px}
    .cz-mwrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
    .cz-matrix{width:100%;border-collapse:collapse;font-size:.72rem;background:#ffffff;border:1px solid #e8ddd0;border-radius:10px;overflow:hidden}
    .cz-matrix th{font-size:.56rem;font-weight:700;text-transform:uppercase;letter-spacing:.03em;color:#b09880;text-align:left;padding:7px 10px;border-bottom:1px solid #e8ddd0;white-space:nowrap}
    .cz-matrix th.cz-riv-h{color:#c2410c}
    .cz-matrix td{padding:6px 10px;border-bottom:1px solid #f0ebe4;white-space:nowrap;color:#211c14}
    .cz-matrix tr:last-child td{border-bottom:none}
    .cz-matrix td.cz-riv{color:#c2410c;font-weight:700}
    .cz-matrix td.cz-riv img{height:1em;width:auto;border-radius:1px;margin:0 3px 0 0;vertical-align:-.1em}
    .cz-vs{color:#b09880;font-weight:400;font-size:.85em}
    .cz-note{font-weight:400;color:#7c6a58;font-size:.64rem}
    .cz-confirm{font-size:.92rem;font-weight:700;color:#c2410c;display:flex;align-items:center;gap:6px}
    .cz-confirm img{height:1em;width:auto;border-radius:1px}
    .cz-branch{background:#ffffff;border:1px solid #e8ddd0;border-radius:10px;padding:11px 13px;margin-bottom:9px}
    .cz-tag{font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#b09880;margin:5px 0 9px}
    .cz-opps{display:flex;flex-wrap:wrap;gap:6px}
    .cz-opp{display:inline-flex;align-items:center;gap:5px;font-size:.74rem;background:#f0ebe4;border-radius:6px;padding:4px 9px}
    .cz-opp img{height:1em;width:auto;border-radius:1px}
    .cz-bw{display:flex;flex-wrap:wrap;gap:8px 18px;margin-top:10px;padding-top:9px;border-top:1px solid #f0ebe4;font-size:.72rem}
    .cz-bw img{height:1em;width:auto;border-radius:1px;vertical-align:-.1em;margin:0 3px}
    .cz-bw-k{font-size:.55rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#c2410c;margin-right:5px}
    .sl-grp{width:100%;border-collapse:collapse;background:#ffffff;border:1px solid #e8ddd0;border-radius:10px;overflow:hidden}
    .sl-grp th{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#b09880;text-align:center;padding:8px 4px;border-bottom:1px solid #e8ddd0}
    .sl-grp th:nth-child(2){text-align:left;padding-left:12px}
    .sl-grp td{font-size:.82rem;text-align:center;padding:9px 4px;border-bottom:1px solid #f0ebe4}
    .sl-grp td.sl-tn{text-align:left;padding-left:12px;font-weight:600;display:flex;align-items:center}
    .sl-grp tr:last-child td{border-bottom:none}
    .sl-grp tr.sl-me{background:#f0ebe4}
    .sl-grp tr.sl-me td.sl-tn{color:#c2410c}
    .sl-tn .sl-tlink{color:inherit;text-decoration:none;display:flex;align-items:center}
    .sl-tn .sl-tlink:hover{color:#c2410c;text-decoration:underline}
    .sl-matches{display:flex;flex-direction:column;gap:7px}
    .sl-m{background:#ffffff;border:1px solid #e8ddd0;border-radius:10px;overflow:hidden}
    .sl-m:hover{border-color:#c8b8a8}
    .sl-m-top{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;padding:11px 64px 11px 14px;position:relative;cursor:pointer;user-select:none}
    .sl-mh{justify-self:end;text-align:right;font-size:.85rem;display:flex;align-items:center}
    .sl-ma{justify-self:start;text-align:left;font-size:.85rem;display:flex;align-items:center}
    .sl-sc{font-size:.95rem;font-weight:700;color:#c2410c;min-width:48px;text-align:center}
    .sl-dt{font-size:.72rem;font-weight:600;color:#7c6a58;min-width:74px;text-align:center}
    .sl-live{position:absolute;top:-7px;left:50%;transform:translateX(-50%);font-size:.52rem;font-weight:700;letter-spacing:.05em;background:#c2410c;color:#fff;padding:1px 7px;border-radius:6px}
    .sl-toggle{position:absolute;right:13px;top:50%;transform:translateY(-50%);display:flex;align-items:center;gap:5px}
    .sl-toggle-t{font-size:.54rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#7c6a58}
    .sl-toggle-t::after{content:"Abrir"}
    .sl-m.open .sl-toggle-t::after{content:"Cerrar"}
    .sl-m.open .sl-toggle-t{color:#c2410c}
    .sl-chev{color:#c8b8a8;font-size:.7rem;transition:transform .2s}
    .sl-m.open .sl-chev{transform:rotate(180deg);color:#c2410c}
    .sl-m-detail{display:none;border-top:1px solid #f0ebe4;padding:11px 14px;background:#faf8f4}
    .sl-m.open .sl-m-detail{display:block}
    .sl-full-wrap{text-align:center;margin-top:11px}
    .sl-full{display:inline-flex;align-items:center;gap:6px;font-size:.72rem;font-weight:700;
             letter-spacing:.02em;color:#c2410c;text-decoration:none;border:1px solid #c2410c;border-radius:999px;
             padding:6px 14px;background:rgba(194,65,12,.05);transition:background .15s,color .15s}
    .sl-full:hover{background:#c2410c;color:#fff}
    .hoy-dsec{margin-bottom:9px}
    .hoy-dsec:last-child{margin-bottom:0}
    .hoy-dsec-t{font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#b09880;margin:0 0 4px}
    .hoy-ev{display:flex;align-items:flex-start;gap:6px;padding:2px 0;font-size:.75rem;color:#211c14}
    .hoy-ev-min{color:#b09880;font-size:.68rem;min-width:26px;flex-shrink:0;padding-top:1px}
    .hoy-ev-dot{width:7px;height:7px;border-radius:50%;background:#c2410c;flex-shrink:0;margin-top:3px}
    .hoy-ev-yc{width:7px;height:10px;background:#d97706;flex-shrink:0;margin-top:2px;border-radius:1px}
    .hoy-ev-rc{width:7px;height:10px;background:#dc2626;flex-shrink:0;margin-top:2px;border-radius:1px}
    .hoy-ev-sw{font-size:.75rem;color:#0d9488;flex-shrink:0;line-height:1.4}
    .hoy-ev-s{color:#7c6a58;font-size:.68rem}
    .hoy-ev-txt{flex:1;line-height:1.45}
    .gf-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:3px 0;font-size:.78rem}
    .gf-tm{display:inline-flex;align-items:center;flex-shrink:0}
    .gf-ph{color:#c2410c;font-weight:700;font-size:.66rem;text-align:right;white-space:nowrap}
    .sl-cta{display:inline-flex;align-items:center;gap:6px;font-size:.85rem;font-weight:700;color:#fff;background:#c2410c;border-radius:9px;padding:11px 18px;text-decoration:none}
    .sl-cta:hover{opacity:.92}
    .loading{text-align:center;color:#7c6a58;font-size:.85rem;margin-top:40px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a class="back" href="/">&#8592; Volver al inicio</a>
      <span class="brand">Mundial 2026</span>
    </div>
    <div id="sel"><p class="loading">Cargando selección…</p></div>
  </div>
  <script>
    function fmtDT(utc) {
      var d = new Date(utc);
      if (isNaN(d)) return '';
      var f = d.toLocaleDateString('es', {day:'2-digit', month:'2-digit'});
      var h = d.toLocaleTimeString('es', {hour:'2-digit', minute:'2-digit'});
      return f + ' · ' + h;
    }
    (function() {
      var t = new URLSearchParams(location.search).get('t') || '';
      var box = document.getElementById('sel');
      fetch('/api/selecciones')
        .then(function(r) { return r.json(); })
        .then(function(d) {
          var html = d[t];
          if (html) {
            box.innerHTML = html;
            document.title = t + ' · Mundial 2026';
            box.querySelectorAll('.sl-dt[data-utc]').forEach(function(e) {
              var s = fmtDT(e.dataset.utc); if (s) e.textContent = s;
            });
          } else {
            box.innerHTML = '<p class="loading">Selección no disponible todavía.</p>';
          }
        })
        .catch(function() { box.innerHTML = '<p class="loading">No se pudo cargar la selección.</p>'; });
    })();
  </script>
</body>
</html>
