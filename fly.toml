app = "mundial2026-franco"
primary_region = "gru"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/data.json"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
