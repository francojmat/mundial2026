<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Admin · Mundial 2026</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#faf8f4;color:#211c14;padding:32px 24px;max-width:900px;margin:0 auto}
    h1{font-size:1.1rem;font-weight:700;margin-bottom:4px}
    .sub{font-size:.75rem;color:#7c6a58;margin-bottom:28px}
    #login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:12px}
    #login-screen h2{font-size:1rem}
    #pwd-input{border:1px solid #e8ddd0;padding:10px 14px;font-size:.9rem;font-family:inherit;width:280px;background:#fff}
    #pwd-input:focus{outline:1px solid #c2410c}
    #login-btn{background:#c2410c;color:#fff;border:none;padding:10px 28px;font-size:.78rem;font-weight:700;cursor:pointer;letter-spacing:.06em;text-transform:uppercase}
    #login-btn:hover{background:#a83509}
    #login-err{color:#dc2626;font-size:.78rem;display:none}
    #panel{display:none}
    .tabs{display:flex;border-bottom:2px solid #e8ddd0;margin-bottom:24px}
    .tab{padding:8px 20px;font-size:.78rem;font-weight:700;cursor:pointer;letter-spacing:.06em;text-transform:uppercase;color:#7c6a58;border:none;background:none}
    .tab.active{color:#c2410c;border-bottom:2px solid #c2410c;margin-bottom:-2px}
    .tab-pane{display:none}
    .tab-pane.active{display:block}
    .sug-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .sug-count{font-size:.75rem;color:#7c6a58}
    .action-btn{font-size:.7rem;color:#c2410c;background:none;border:none;cursor:pointer;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
    .refresh-btn{font-size:.7rem;color:#7c6a58;background:none;border:1px solid #e8ddd0;padding:5px 12px;cursor:pointer;margin-right:8px}
    .sug-item{background:#fff;border:1px solid #e8ddd0;padding:12px 16px;margin-bottom:8px}
    .sug-item.unread{border-left:3px solid #c2410c}
    .sug-item.read{opacity:.6}
    .sug-meta{font-size:.68rem;color:#b09880}
    .sug-name{font-weight:700;text-transform:uppercase;letter-spacing:.06em}
    .sug-msg{font-size:.85rem;margin-top:5px;line-height:1.5;color:#211c14}
    .sug-empty{font-size:.8rem;color:#b09880;padding:24px 0;text-align:center}
    .loading{text-align:center;padding:40px;color:#b09880;font-size:.8rem}
    .m-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
    .m-card{background:#fff;border:1px solid #e8ddd0;padding:16px 20px}
    .m-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#b09880;margin-bottom:6px}
    .m-val{font-size:2rem;font-weight:700;color:#c2410c;line-height:1}
    .m-chart-wrap{background:#fff;border:1px solid #e8ddd0;padding:16px 20px}
    .m-chart-title{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#b09880;margin-bottom:12px}
    @media(max-width:600px){.m-cards{grid-template-columns:1fr}}
  </style>
</head>
<body>

<div id="login-screen">
  <h2>Panel de administración</h2>
  <input id="pwd-input" type="password" placeholder="Contraseña" autocomplete="current-password">
  <button id="login-btn" onclick="login()">Entrar</button>
  <p id="login-err">Contraseña incorrecta</p>
</div>

<div id="panel">
  <h1>Panel · Mundial 2026</h1>
  <p class="sub" id="admin-sub"></p>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('sugs')">Sugerencias</button>
    <button class="tab" onclick="switchTab('metrics')">Métricas</button>
  </div>

  <div id="tab-sugs" class="tab-pane active">
    <div class="sug-bar">
      <span class="sug-count" id="sug-count"></span>
      <div>
        <button class="refresh-btn" onclick="loadSuggestions()">↺ Actualizar</button>
        <button class="action-btn" onclick="markAllRead()">Marcar todo leído</button>
      </div>
    </div>
    <div id="sug-list"><p class="loading">Cargando sugerencias…</p></div>
  </div>

  <div id="tab-metrics" class="tab-pane">
    <div id="metrics-loading" class="loading">Cargando métricas…</div>
    <div id="metrics-content" style="display:none">
      <div class="m-cards">
        <div class="m-card"><div class="m-label">Visitas hoy</div><div class="m-val" id="m-today">—</div></div>
        <div class="m-card"><div class="m-label">Últimos 7 días</div><div class="m-val" id="m-week">—</div></div>
        <div class="m-card"><div class="m-label">Últimos 30 días</div><div class="m-val" id="m-month">—</div></div>
      </div>
      <div class="m-chart-wrap">
        <p class="m-chart-title">Visitas por día — últimos 30 días</p>
        <div id="m-chart"></div>
      </div>
    </div>
  </div>
</div>

<script>
const API = 'https://mejortercero.online/api';
let _token = '';

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function login() {
  const pwd = document.getElementById('pwd-input').value;
  if (!pwd) return;
  const hash = await sha256(pwd);
  const res = await fetch(`${API}/suggestions?token=${encodeURIComponent(hash)}`);
  if (res.status === 401) {
    document.getElementById('login-err').style.display = 'block';
    return;
  }
  _token = hash;
  sessionStorage.setItem('adm_token', hash);
  showPanel();
  renderSuggestions(await res.json());
}

document.getElementById('pwd-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});

(async () => {
  const saved = sessionStorage.getItem('adm_token');
  if (!saved) return;
  const res = await fetch(`${API}/suggestions?token=${encodeURIComponent(saved)}`);
  if (res.ok) {
    _token = saved;
    showPanel();
    renderSuggestions(await res.json());
  }
})();

function showPanel() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('panel').style.display = 'block';
  const now = new Date().toLocaleString('es-AR', { dateStyle:'short', timeStyle:'short' });
  document.getElementById('admin-sub').textContent = `Sesión activa · ${now}`;
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) =>
    t.classList.toggle('active', ['sugs','metrics'][i] === name));
  document.getElementById('tab-sugs').classList.toggle('active', name === 'sugs');
  document.getElementById('tab-metrics').classList.toggle('active', name === 'metrics');
  if (name === 'metrics' && document.getElementById('metrics-content').style.display === 'none') {
    loadMetrics();
  }
}

// ── Métricas ─────────────────────────────────────────────────────────────────

async function loadMetrics() {
  const res = await fetch(`${API}/metrics?token=${encodeURIComponent(_token)}`);
  if (!res.ok) return;
  const d = await res.json();

  document.getElementById('metrics-loading').style.display = 'none';
  document.getElementById('metrics-content').style.display = 'block';
  document.getElementById('m-today').textContent = d.today_views.toLocaleString('es-AR');
  document.getElementById('m-week').textContent  = d.week_views.toLocaleString('es-AR');
  document.getElementById('m-month').textContent = d.month_views.toLocaleString('es-AR');
  document.getElementById('m-chart').innerHTML   = renderChart(d.daily);
}

function renderChart(daily) {
  if (!daily || !daily.length) return '<p style="color:#b09880;font-size:.8rem;padding:8px 0">Sin datos aún.</p>';

  const W = 560, H = 160;
  const P = {t:12, r:12, b:32, l:38};
  const cw = W - P.l - P.r, ch = H - P.t - P.b;
  const maxV = Math.max(...daily.map(d => d.views), 1);
  const n = daily.length;
  const px = i => P.l + (i / Math.max(n - 1, 1)) * cw;
  const py = v => P.t + ch - (v / maxV) * ch;

  const pts = daily.map((d, i) => `${px(i).toFixed(1)},${py(d.views).toFixed(1)}`);
  const line = `M ${pts.join(' L ')}`;
  const fill = `${line} L ${px(n-1).toFixed(1)},${(P.t+ch).toFixed(1)} L ${P.l},${(P.t+ch).toFixed(1)} Z`;

  const grid = [0, 0.5, 1].map(p => {
    const yv = (P.t + ch - p * ch).toFixed(1);
    return `<line x1="${P.l}" y1="${yv}" x2="${P.l+cw}" y2="${yv}" stroke="#e8ddd0" stroke-width="1"/>
            <text x="${P.l-4}" y="${(+yv+3.5).toFixed(1)}" text-anchor="end" font-size="9" fill="#b09880">${Math.round(p*maxV)}</text>`;
  }).join('');

  const labels = daily.map((d, i) => {
    if (i % 7 !== 0 && i !== n - 1) return '';
    const dt = new Date(d.day + 'T12:00:00');
    const lbl = dt.toLocaleDateString('es-AR', {day:'numeric', month:'short'});
    return `<text x="${px(i).toFixed(1)}" y="${H-5}" text-anchor="middle" font-size="9" fill="#b09880">${lbl}</text>`;
  }).join('');

  const dots = n <= 20
    ? daily.map((d, i) => `<circle cx="${px(i).toFixed(1)}" cy="${py(d.views).toFixed(1)}" r="2.5" fill="#c2410c"/>`)
    : [];

  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block">
    ${grid}
    <path d="${fill}" fill="rgba(194,65,12,.08)"/>
    <path d="${line}" fill="none" stroke="#c2410c" stroke-width="2" stroke-linejoin="round"/>
    ${dots.join('')}
    ${labels}
  </svg>`;
}

async function loadSuggestions() {
  document.getElementById('sug-list').innerHTML = '<p class="loading">Cargando…</p>';
  const res = await fetch(`${API}/suggestions?token=${encodeURIComponent(_token)}`);
  renderSuggestions(await res.json());
}

function renderSuggestions(sugs) {
  const unread = sugs.filter(s => !s.read).length;
  document.getElementById('sug-count').textContent =
    `${sugs.length} sugerencias · ${unread} sin leer`;

  if (!sugs.length) {
    document.getElementById('sug-list').innerHTML =
      '<p class="sug-empty">No hay sugerencias todavía.</p>';
    return;
  }

  document.getElementById('sug-list').innerHTML = sugs.map(s => {
    const ts = new Date(s.ts).toLocaleString('es-AR', {
      day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'
    });
    const safeId = s.id.replace(/[^a-zA-Z0-9_-]/g, '_');
    return `<div class="sug-item ${s.read ? 'read' : 'unread'}" id="si_${safeId}">
      <div class="sug-meta">
        <span class="sug-name">${esc(s.name)}</span>
        &nbsp;·&nbsp;${ts}
        ${s.page ? `&nbsp;·&nbsp;${esc(s.page)}` : ''}
      </div>
      <p class="sug-msg">${esc(s.msg)}</p>
    </div>`;
  }).join('');
}

async function markAllRead() {
  const items = [...document.querySelectorAll('.sug-item.unread')];
  if (!items.length) return;
  const ids = items.map(el => el.id.slice(3).replace(/_/g, ':').replace('sug:', 'sug:'));
  await fetch(`${API}/mark-read`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ token: _token, ids }),
  });
  items.forEach(el => { el.classList.remove('unread'); el.classList.add('read'); });
  const cnt = document.getElementById('sug-count');
  cnt.textContent = cnt.textContent.replace(/\d+ sin leer/, '0 sin leer');
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
</script>
</body>
</html>
